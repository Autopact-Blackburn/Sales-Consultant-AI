  <style>
    :root{--bg:#101827;--bg2:#162033;--panel:rgba(255,255,255,.055);--panel2:rgba(255,255,255,.085);--line:rgba(255,255,255,.11);--text:#f6f8fb;--muted:#aab6c7;--soft:#d7dfec;--accent:#7dd3fc;--accent2:#c084fc;--good:#86efac;--warn:#fde68a;--bad:#fca5a5;--shadow:0 24px 80px rgba(0,0,0,.35);--radius:24px}*{box-sizing:border-box}body{margin:0;font-family:"DM Sans",system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at 20% 0%,rgba(125,211,252,.18),transparent 34%),radial-gradient(circle at 85% 10%,rgba(192,132,252,.16),transparent 30%),linear-gradient(135deg,var(--bg),var(--bg2));min-height:100vh}button,input,select,textarea{font:inherit}.hidden{display:none!important}.muted{color:var(--muted)}.small{font-size:13px}.eyebrow{letter-spacing:.14em;text-transform:uppercase;color:#9fdcff;font-size:12px;font-weight:900;margin:0 0 8px}.shell{width:min(1260px,calc(100% - 32px));margin:0 auto;padding:28px 0 48px}.narrow{width:min(520px,calc(100% - 32px));display:grid;min-height:100vh;place-items:center;padding:24px 0}.panel,.card,.metric,.dropzone{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px);border-radius:var(--radius)}.login-card{padding:32px;width:100%}.login-card h1{font-size:30px;margin:0 0 8px}.field{display:grid;gap:8px;margin:16px 0}.field span{font-weight:800;color:var(--soft);font-size:13px}.input,.select,.textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.075);color:var(--text);border-radius:15px;padding:13px 14px;outline:none}.textarea{min-height:155px;resize:vertical;line-height:1.45}.input:focus,.select:focus,.textarea:focus{border-color:rgba(125,211,252,.6);box-shadow:0 0 0 4px rgba(125,211,252,.08)}.select option{color:#111827}.btn{border:0;border-radius:15px;padding:12px 16px;font-weight:900;cursor:pointer;color:var(--text);background:rgba(255,255,255,.09);border:1px solid var(--line);transition:.18s ease;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.13)}.btn.primary{background:linear-gradient(135deg,#38bdf8,#a78bfa);color:#07111f;border-color:transparent}.btn.full{width:100%}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:24px}.brand h1{font-size:30px;margin:0}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 24px}.tab{padding:11px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-weight:900}.tab.active{color:#06111f;background:linear-gradient(135deg,#7dd3fc,#c084fc);border-color:transparent}.grid{display:grid;gap:16px}.grid.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.metric{padding:20px}.metric .label{color:var(--muted);font-size:13px;font-weight:800}.metric .value{font-size:28px;font-weight:900;margin-top:6px}.panel{padding:24px;margin-bottom:18px}.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:16px}.section-head h2{margin:0 0 6px;font-size:22px}.dropzone{padding:42px;text-align:center;border-style:dashed;box-shadow:none;cursor:pointer;background:rgba(255,255,255,.045)}.dropzone.drag{border-color:rgba(125,211,252,.9);background:rgba(125,211,252,.10)}.dropzone .big{font-size:24px;font-weight:900;margin:8px 0}.file-list{display:grid;gap:10px;margin-top:16px}.file-row{display:flex;justify-content:space-between;gap:10px;align-items:center;background:rgba(255,255,255,.055);border:1px solid var(--line);padding:12px;border-radius:16px}.pill{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;background:rgba(125,211,252,.12);color:#bae6fd;border:1px solid rgba(125,211,252,.22);white-space:nowrap}.pill.good{background:rgba(134,239,172,.12);color:#bbf7d0;border-color:rgba(134,239,172,.22)}.pill.warn{background:rgba(253,230,138,.12);color:#fef3c7;border-color:rgba(253,230,138,.22)}.pill.bad{background:rgba(252,165,165,.12);color:#fecaca;border-color:rgba(252,165,165,.22)}.table-wrap{overflow:auto;border-radius:18px;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;min-width:1180px;background:rgba(255,255,255,.035)}th,td{text-align:left;padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.07);font-size:14px}th{color:#cbd5e1;font-size:12px;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.045)}tr:hover td{background:rgba(255,255,255,.035)}.right{text-align:right}.coach{display:grid;gap:12px}.coach-card{padding:16px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045)}.settings-box{display:grid;grid-template-columns:1fr 1fr;gap:14px}.toast{position:fixed;right:18px;bottom:18px;max-width:420px;padding:14px 16px;border-radius:16px;background:#0b1220;border:1px solid var(--line);box-shadow:var(--shadow);z-index:50}.modal{position:fixed;inset:0;background:rgba(2,6,23,.72);display:grid;place-items:center;padding:18px;z-index:40}.modal-box{width:min(980px,100%);max-height:88vh;overflow:auto;background:#101827;border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow)}.modal-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.x{font-size:24px;line-height:1}.formula{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#cbd5e1;white-space:pre-wrap}.mobile-cards{display:none}.person-card{padding:16px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.05)}.kv{display:grid;grid-template-columns:1fr auto;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}.kv:last-child{border-bottom:0}@media(max-width:900px){.shell{width:min(100% - 22px,1260px);padding-top:18px}.grid.cols4,.grid.cols3,.grid.cols2,.settings-box{grid-template-columns:1fr}.topbar{display:block}.actions{margin-top:14px}.section-head{display:block}.section-head .btn{margin-top:12px}.table-wrap{display:none}.mobile-cards{display:grid;gap:12px}.login-card{padding:26px}.metric .value{font-size:24px}}

<body>
  <div id="loginView" class="narrow"><section class="login-card panel"><p class="eyebrow">Secure Access</p><h1>Dealership Performance</h1><p class="muted">One clean operating room for commissions, PSP and coaching.</p><form id="loginForm"><label class="field"><span>Email</span><input id="loginEmail" class="input" type="email" required placeholder="name@dealership.com.au"></label><label class="field"><span>Password</span><input id="loginPassword" class="input" type="password" required></label><button class="btn primary full" type="submit">Log in</button></form><p id="loginMsg" class="muted small"></p></section></div>
  <div id="appView" class="hidden"><main class="shell"><header class="topbar"><div class="brand"><p class="eyebrow" id="roleLabel">Performance Intelligence</p><h1 id="pageTitle">Dashboard</h1><p class="muted" id="welcomeLine"></p></div><div class="actions"><select id="periodSelect" class="select"></select><button id="logoutBtn" class="btn">Log out</button></div></header><nav id="tabs" class="tabs"></nav><section id="importTab" class="view"></section><section id="dashboardTab" class="view hidden"></section><section id="coachingTab" class="view hidden"></section><section id="settingsTab" class="view hidden"></section></main></div>
  <div id="modal" class="modal hidden"><div class="modal-box"><div class="modal-head"><div><p class="eyebrow">PSP / Commission Review</p><h2 id="modalTitle">Salesperson</h2></div><button id="modalClose" class="btn x">×</button></div><div id="modalBody"></div></div></div><div id="toast" class="toast hidden"></div>
<script type="module">
const SUPABASE_URL='https://snzjsuwqetomdkvphvzs.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzbnpqc3V3cWV0b21ka3ZwaHZ6cyIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzc3OTQ0OTE5LCJleHAiOjIwOTM1MjA5MTl9.mkJ1_nxP0emPvhSqgUz7Q4zKm63LtG0J7xiYhwT78QQ';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const REQUIRED_TYPES=['deal_log','finance','aftercare','accessories','signups','leads'];
const TYPE_LABEL={deal_log:'Deal Log',finance:'Finance',aftercare:'Aftercare',accessories:'Accessories',signups:'Sign Ups',leads:'Leads / Activity'};
let state={user:null,profile:null,periods:[],period:null,files:{},parsed:{},npsRows:[],metrics:[],deals:[],settings:null,active:'dashboard'};
const $=id=>document.getElementById(id);const key=s=>String(s||'').trim().toLowerCase().replace(/\s+/g,' ');const money=n=>new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',maximumFractionDigits:0}).format(Number(n||0));const pct=n=>`${Math.round(Number(n||0)*100)}%`;const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg){$('toast').textContent=msg;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),4500)}
function num(v){if(v==null)return 0;let s=String(v).replace(/[$,]/g,'').trim();if(!s||s==='-'||s==='#DIV/0!'||s==='#N/A')return 0;const neg=/^\(.*\)$/.test(s)||s.startsWith('-');s=s.replace(/[()%]/g,'').replace('-','');let n=Number(s);if(!Number.isFinite(n))return 0;if(String(v).includes('%'))n=n/100;return neg?-n:n}
function first(row,names){const keys=Object.keys(row||{});for(const n of names){let hit=keys.find(k=>key(k)===key(n));if(hit)return row[hit];hit=keys.find(k=>key(k).includes(key(n)));if(hit)return row[hit]}return ''}
function salesName(row){return String(first(row,['Salesperson','Sales Person','Sales Consultant','Consultant','Sold By','Sales Executive','Name','Results','Result','Staff Member','Employee','Finance Manager','Business Manager'])).trim()}
function dealNo(row){return String(first(row,['Deal No','Deal Number','Deal #','DMS Deal','Stock No','Stock Number','Contract No','Contract Number'])).trim()}
async function boot(){$('loginForm').addEventListener('submit',login);$('logoutBtn').addEventListener('click',logout);$('periodSelect').addEventListener('change',()=>{state.period=state.periods.find(p=>p.id===$('periodSelect').value);refreshData()});$('modalClose').onclick=()=>$('modal').classList.add('hidden');const {data:{session}}=await sb.auth.getSession();if(!session){showLogin();return}state.user=session.user;await loadProfile();await loadPeriods();await loadSettings();route();await refreshData()}
function showLogin(){$('loginView').classList.remove('hidden');$('appView').classList.add('hidden')}
async function login(e){e.preventDefault();$('loginMsg').textContent='Checking access...';const {data,error}=await sb.auth.signInWithPassword({email:$('loginEmail').value.trim(),password:$('loginPassword').value});if(error){$('loginMsg').textContent=error.message;return}state.user=data.user;await loadProfile();await loadPeriods();await loadSettings();route();await refreshData()}
async function logout(){await sb.auth.signOut();location.reload()}
async function loadProfile(){const {data,error}=await sb.from('app_profiles').select('*').eq('auth_user_id',state.user.id).eq('active',true).limit(1).maybeSingle();if(error||!data){$('loginMsg').textContent='No active app profile found for this login.';toast('No active app profile found. Add this user to app_profiles.');await sb.auth.signOut();showLogin();throw error||new Error('No active app profile found')}state.profile=data}
async function loadPeriods(){const {data,error}=await sb.from('commission_periods').select('*').order('month_start',{ascending:false});if(error)throw error;state.periods=data||[];state.period=state.periods[0];$('periodSelect').innerHTML=state.periods.map(p=>`<option value="${p.id}">${esc(p.label)}</option>`).join('');if(state.period)$('periodSelect').value=state.period.id}
async function loadSettings(){const {data}=await sb.from('commission_settings').select('*').eq('active',true).limit(1).maybeSingle();state.settings=data?.settings||defaultSettings()}
function defaultSettings(){return{volume_unlocks:[{units:12,unlock:.25},{units:15,unlock:.75},{units:18,unlock:1}],commission_rate:.05,kpi_targets:{finance_penetration:.45,finance_ipur:1800,aftercare_ppv:950,accessory_gp:500,reviews:1,nps:.85,dah:.85},kpi_bonus:{finance_penetration:250,finance_ipur:500,aftercare_ppv:500,accessory_gp:150,reviews:25,nps:250,dah:250}}}
function route(){$('loginView').classList.add('hidden');$('appView').classList.remove('hidden');const r=state.profile.role;$('roleLabel').textContent=r==='admin'?'Admin access':r==='manager'?'Manager access':'Salesperson view';$('welcomeLine').textContent=`Welcome, ${state.profile.full_name}`;const tabs=r==='admin'?[['import','Imports'],['dashboard','Dashboard'],['coaching','AI Coaching'],['settings','Settings']]:r==='manager'?[['import','Imports'],['dashboard','Dashboard'],['coaching','AI Coaching']]:[['dashboard','My Performance'],['coaching','My Coaching']];state.active=r==='salesperson'?'dashboard':'import';renderTabs(tabs)}
function renderTabs(tabs){$('tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab ${id===state.active?'active':''}" data-tab="${id}">${label}</button>`).join('');$('tabs').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.active=b.dataset.tab;showTab();renderTabs(tabs)});showTab()}
function showTab(){['import','dashboard','coaching','settings'].forEach(t=>$(t+'Tab').classList.toggle('hidden',state.active!==t));$('pageTitle').textContent=state.active==='import'?'Commission Data Imports':state.active==='settings'?'Settings':state.active==='coaching'?'AI Coaching':'Team commissions'}
async function refreshData(){if(!state.period)return;await loadDashboardData();renderAll()}
async function loadDashboardData(){const {data:metrics}=await sb.from('salesperson_monthly_metrics').select('*').eq('period_id',state.period.id).order('units',{ascending:false});state.metrics=metrics||[];const {data:deals}=await sb.from('master_deals').select('*').eq('period_id',state.period.id).order('salesperson');state.deals=deals||[]}
function renderAll(){renderImport();renderDashboard();renderCoaching();renderSettings();showTab()}
function renderImport(){if(state.profile.role==='salesperson')return;const done=Object.keys(state.parsed).length;const npsDone=state.npsRows.length;const staged=Object.values(state.parsed).reduce((a,b)=>a+b.rows.length,0);$('importTab').innerHTML=`<section class="grid cols4"><div class="metric"><div class="label">Files detected</div><div class="value">${done} / 6</div></div><div class="metric"><div class="label">Period</div><div class="value">${esc(state.period?.label||'')}</div></div><div class="metric"><div class="label">Rows staged</div><div class="value">${staged}</div></div><div class="metric"><div class="label">NPS rows</div><div class="value">${npsDone}</div></div></section><section class="panel"><div class="section-head"><div><h2>Upload monthly CSV exports</h2><p class="muted">Drop the six files here. Deal Log anchors deliveries. Finance, Aftercare, Accessories, Sign Ups and Leads also aggregate by salesperson if deal numbers are missing.</p></div><button class="btn primary" id="normalizeBtn">Run normalization</button></div><div id="dropzone" class="dropzone"><input id="fileInput" type="file" accept=".csv,.txt" multiple hidden><div class="eyebrow">CSV Import</div><div class="big">Drop files here or click to browse</div><p class="muted">Deal Log, Finance, Aftercare, Accessories, Sign Ups and Leads / Activity.</p></div><div id="fileList" class="file-list"></div></section><section class="panel"><div class="section-head"><div><h2>NPS / DAH / Google Reviews</h2><p class="muted">Paste directly from Excel. Format: Name, NPS, DAH, Google Reviews.</p></div><button class="btn" id="parseNpsBtn">Stage NPS data</button></div><textarea id="npsInput" class="textarea" placeholder="Name\tNPS\tDAH\tGoogle Reviews\nDavid Wang\t33%\t33.3%\t0\nLiam Williamson\t100%\t75.0%\t1"></textarea><p id="npsStatus" class="muted small"></p></section>`;const dz=$('dropzone'),fi=$('fileInput');dz.onclick=()=>fi.click();dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag')};dz.ondragleave=()=>dz.classList.remove('drag');dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files)};fi.onchange=e=>handleFiles(e.target.files);$('normalizeBtn').onclick=normalizeAndSave;$('parseNpsBtn').onclick=()=>{state.npsRows=parseNps($('npsInput').value);$('npsStatus').textContent=`Staged ${state.npsRows.length} NPS rows.`;renderImport()};renderFileList()}
function renderFileList(){const box=$('fileList');if(!box)return;box.innerHTML=REQUIRED_TYPES.map(t=>{const p=state.parsed[t];return`<div class="file-row"><div><strong>${TYPE_LABEL[t]}</strong><div class="small muted">${p?esc(p.name):'Waiting for file'}${p?.confidence?` · confidence ${p.confidence}`:''}</div></div><span class="pill ${p?'good':'warn'}">${p?p.rows.length+' rows':'Missing'}</span></div>`}).join('')}
async function handleFiles(fileList){for(const file of Array.from(fileList)){const text=await file.text();const rows=parseCSV(text);const detection=detectType(file.name,rows[0]||{});if(!detection.type){toast(`Could not detect ${file.name}`);continue}state.parsed[detection.type]={name:file.name,rows,confidence:detection.confidence,score:detection.score};toast(`${file.name} detected as ${TYPE_LABEL[detection.type]}`)}renderFileList()}
function parseCSV(text){const rows=[];let cur='',row=[],q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){cur+='"';i++;continue}if(c==='"'){q=!q;continue}if(c===','&&!q){row.push(cur);cur='';continue}if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cur);if(row.some(x=>String(x).trim()))rows.push(row);row=[];cur='';continue}cur+=c}row.push(cur);if(row.some(x=>String(x).trim()))rows.push(row);if(!rows.length)return[];const headers=rows.shift().map(h=>h.trim());return rows.map(r=>Object.fromEntries(headers.map((h,i)=>[h,(r[i]??'').trim()]))) }
function detectType(name,row){const n=key(name);const headers=Object.keys(row).map(key);const has=s=>headers.some(h=>h.includes(key(s)));const score={deal_log:0,finance:0,aftercare:0,accessories:0,signups:0,leads:0};if(n.includes('deal log')||n==='deal log.csv')score.deal_log+=70;if(n.includes('finance')||n.includes('f&i'))score.finance+=60;if(n.includes('aftercare')||n.includes('aftermarket'))score.aftercare+=60;if(n.includes('acc')||n.includes('accessor'))score.accessories+=60;if(n.includes('sign'))score.signups+=60;if(n.includes('lead')||n.includes('activity'))score.leads+=60;if(has('processed gross'))score.deal_log+=60;if(has('gross new')||has('gross used'))score.deal_log+=25;if(has('finance pen')||has('finance ipur')||has('total income')||has('dealer finance'))score.finance+=45;if(has('aftercare ppv')||has('total aftermarket')||has('aftermarket'))score.aftercare+=45;if(has('accessory pvr')||has('accessory')||has('sale amount')&&has('cost amount'))score.accessories+=45;if(has('sign ups')||has('signup'))score.signups+=45;if(has('lead')||has('enquiry')||has('test drive')||has('activity'))score.leads+=45;if(has('deal no')||has('deal number'))score.deal_log+=15;if(has('vehicle')||has('make')||has('model'))score.deal_log+=10;if(score.deal_log>=90)score.accessories-=40;const winner=Object.entries(score).sort((a,b)=>b[1]-a[1])[0];return{type:winner[1]>25?winner[0]:null,score,confidence:winner[1]>=90?'high':winner[1]>=55?'medium':'low'}}
function parseNps(text){const lines=String(text||'').split(/\r?\n/).map(l=>l.trim()).filter(Boolean);const out=[];for(const line of lines){const parts=line.includes('\t')?line.split('\t'):line.split(',');if(parts.length<3)continue;const name=parts[0].trim();if(!name||key(name).includes('nps'))continue;out.push({salesperson:name,nps:num(parts[1]),dah:num(parts[2]),reviews:num(parts[3]||0)})}return out}
async function normalizeAndSave(){if(!state.parsed.deal_log){toast('Deal Log is required before normalization.');return}toast('Normalizing period...');const periodId=state.period.id;for(const [type,p]of Object.entries(state.parsed)){const {data:batch,error:bErr}=await sb.from('raw_import_batches').insert({period_id:periodId,import_type:type,file_name:p.name,row_count:p.rows.length,uploaded_by:state.user.id}).select().single();if(bErr){toast(bErr.message);return}const rows=p.rows.map((r,i)=>({period_id:periodId,batch_id:batch.id,import_type:type,row_number:i+1,deal_no:dealNo(r),salesperson:salesName(r),customer_name:String(first(r,['Customer','Customer Name','Client'])),raw:r}));for(let i=0;i<rows.length;i+=500){const {error}=await sb.from('raw_import_rows').insert(rows.slice(i,i+500));if(error){toast(error.message);return}}}const deals=buildMasterDeals();await sb.from('master_deals').delete().eq('period_id',periodId);for(let i=0;i<deals.length;i+=500){const {error}=await sb.from('master_deals').insert(deals.slice(i,i+500));if(error){toast(error.message);return}}const metrics=buildMetrics(deals);await sb.from('salesperson_monthly_metrics').delete().eq('period_id',periodId);const {data:staff}=await sb.from('staff').select('*').eq('active',true);const staffMap=Object.fromEntries((staff||[]).map(s=>[key(s.full_name),s]));const payload=metrics.map(m=>({...m,period_id:periodId,staff_id:staffMap[key(m.salesperson)]?.id||null,role_email:staffMap[key(m.salesperson)]?.email||null}));const {error:mErr}=await sb.from('salesperson_monthly_metrics').insert(payload);if(mErr){toast(mErr.message);return}toast('Normalization complete. Dashboard updated.');await refreshData();state.active='dashboard';showTab()}
function buildMasterDeals(){const dealRows=state.parsed.deal_log.rows;const byDeal={};for(const r of dealRows){const d=dealNo(r)||crypto.randomUUID();const sp=salesName(r)||'Unassigned';const processed=num(first(r,['Processed Gross','Gross','PVR','Gross New','Gross Used']));const am=num(first(r,['AM - Gross','AM Gross','Aftermarket Gross']));byDeal[d]={period_id:state.period.id,deal_no:d,customer_name:first(r,['Customer','Customer Name','Client']),salesperson:sp,dealership:first(r,['Dealership','Dealer']),department:first(r,['Department']),brand:first(r,['Brand','Make']),vehicle_make:first(r,['Make','Vehicle Make']),vehicle_model:first(r,['Model','Vehicle Model']),vehicle_variant:first(r,['Variant']),vehicle_description:first(r,['Vehicle','Description','Vehicle Description']),sale_price:num(first(r,['Sale Price','Selling Price','Price'])),processed_gross:processed,am_gross:am,vehicle_gp:processed-am,finance_income:0,finance_deal:false,aftercare_income:0,accessory_gp:0,signup_count:0,lead_count:0,test_drive_count:0,valuation_count:0,payment_method:first(r,['Payment Method']),status:first(r,['Status'])||'New',source:{deal_log:r}}}attachByDeal('finance',(r,d)=>{d.finance_income+=financeIncome(r);d.finance_deal=true});attachByDeal('aftercare',(r,d)=>{d.aftercare_income+=aftercareIncome(r)});attachByDeal('accessories',(r,d)=>{d.accessory_gp+=accessoryIncome(r)});attachByDeal('signups',(r,d)=>{d.signup_count+=1});attachByDeal('leads',(r,d)=>{d.lead_count+=1;if(String(first(r,['Test Drive','Test Drives'])).toLowerCase().includes('yes'))d.test_drive_count+=1;if(String(first(r,['Valuation','Trade Valuation'])).toLowerCase().includes('yes'))d.valuation_count+=1});return Object.values(byDeal);function attachByDeal(type,fn){for(const r of state.parsed[type]?.rows||[]){const d=dealNo(r);if(d&&byDeal[d]){fn(r,byDeal[d]);byDeal[d].source[type]=r}}}}
function financeIncome(r){return num(first(r,['Total Income','Finance Income','Income','Finance IPUR','IPUR','PVR']))}
function aftercareIncome(r){return num(first(r,['Total Aftermarket','Aftermarket','Aftercare Income','Aftercare PPV','AM Gross','PVR']))}
function accessoryIncome(r){return num(first(r,['GP','Gross Profit','Accessory PVR','Accessory GP','PVR']))||(num(first(r,['Sale Amount','Sale']))-num(first(r,['Cost Amount','Cost'])))}
function buildMetrics(deals){const names=new Set(deals.map(d=>d.salesperson||'Unassigned'));for(const type of ['finance','aftercare','accessories','signups','leads'])for(const r of state.parsed[type]?.rows||[]){const sp=salesName(r);if(sp)names.add(sp)}for(const r of state.npsRows)names.add(r.salesperson);return [...names].filter(Boolean).map(sp=>calcMetric(sp,deals.filter(d=>key(d.salesperson)===key(sp)))).sort((a,b)=>b.units-a.units)}
function calcMetric(salesperson,ds){const units=ds.length,total_gp=sum(ds,'vehicle_gp');const f=aggregateFinance(salesperson,units),a=aggregateAftercare(salesperson,units),x=aggregateAccessories(salesperson,units),s=aggregateSimple('signups',salesperson,['Sign Ups','Signups','Sign Up Count']),l=aggregateSimple('leads',salesperson,['Leads','Lead Count','Enquiries','Enquiry Count']);const nps=state.npsRows.find(r=>key(r.salesperson)===key(salesperson))||{};const finance_count=f.count,finance_income=f.income,finance_penetration=f.penOverride??(units?finance_count/units:0),finance_ipur=f.ipurOverride??(finance_count?finance_income/finance_count:0),aftercare_income=a.income,aftercare_ppv=a.ppvOverride??(units?aftercare_income/units:0),accessory_gp=x.income,accessory_gp_per_unit=x.pvrOverride??(units?accessory_gp/units:0),signups=s.count||sum(ds,'signup_count'),leads=l.count||sum(ds,'lead_count'),test_drives=l.testDrives||sum(ds,'test_drive_count'),valuations=l.valuations||sum(ds,'valuation_count'),reviews=Number(nps.reviews||0),npsScore=Number(nps.nps||0),dah=Number(nps.dah||0),volume_unlock=volumeUnlock(units);const components=commissionComponents({units,total_gp,finance_penetration,finance_ipur,aftercare_ppv,accessory_gp_per_unit,reviews,nps:npsScore,dah});const commission_payable=Object.values(components).reduce((a,b)=>a+Number(b||0),0);const psp_score=pspScore({units,finance_penetration,finance_ipur,aftercare_ppv,accessory_gp_per_unit,signups,leads,nps:npsScore,dah,reviews});const psp_tier=pspTier(psp_score);const coaching=coach({salesperson,units,finance_penetration,finance_ipur,aftercare_ppv,accessory_gp_per_unit,signups,leads,reviews,nps:npsScore,dah,score:psp_score,tier:psp_tier});return{salesperson,units,total_gp,finance_count,finance_income,finance_penetration,finance_ipur,aftercare_income,aftercare_ppv,accessory_gp,accessory_gp_per_unit,signups,leads,test_drives,valuations,reviews,nps:npsScore,dah,volume_unlock,psp_score,psp_tier,kpi_bonus:components.kpi_bonus||0,commission_payable,coaching_summary:coaching.summary,strengths:coaching.strengths,opportunities:coaching.opportunities,focus_areas:coaching.focus}}
function aggregateFinance(sp,units){let rows=(state.parsed.finance?.rows||[]).filter(r=>key(salesName(r))===key(sp));let income=0,count=0,penOverride=null,ipurOverride=null;for(const r of rows){const pen=first(r,['Finance Pen%','Finance Pen','Finance %']);const ipur=first(r,['Finance IPUR','IPUR']);if(pen!=='')penOverride=num(pen);if(ipur!=='')ipurOverride=num(ipur);const inc=financeIncome(r);income+=inc;if(inc>0||String(first(r,['Dealer Finance','Finance','Financed'])).toLowerCase().includes('yes'))count++}if(penOverride!=null&&units)count=Math.round(penOverride*units);if(ipurOverride!=null&&count&&!income)income=ipurOverride*count;return{count,income,penOverride,ipurOverride}}
function aggregateAftercare(sp,units){let rows=(state.parsed.aftercare?.rows||[]).filter(r=>key(salesName(r))===key(sp));let income=0,ppvOverride=null;for(const r of rows){const ppv=first(r,['Aftercare PPV','Aftercare PVR','AM PVR','PVR']);if(ppv!=='')ppvOverride=num(ppv);income+=aftercareIncome(r)}if(ppvOverride!=null&&units&&!income)income=ppvOverride*units;return{income,ppvOverride}}
function aggregateAccessories(sp,units){let rows=(state.parsed.accessories?.rows||[]).filter(r=>key(salesName(r))===key(sp));let income=0,pvrOverride=null;for(const r of rows){const pvr=first(r,['Accessory PVR','Accessory GP/U','Accessory GP','PVR']);if(pvr!=='')pvrOverride=num(pvr);income+=accessoryIncome(r)}if(pvrOverride!=null&&units&&!income)income=pvrOverride*units;return{income,pvrOverride}}
function aggregateSimple(type,sp,fields){let rows=(state.parsed[type]?.rows||[]).filter(r=>key(salesName(r))===key(sp));let count=0,testDrives=0,valuations=0;for(const r of rows){const v=first(r,fields);count+=v!==''?num(v):1;if(String(first(r,['Test Drive','Test Drives'])).toLowerCase().includes('yes'))testDrives++;if(String(first(r,['Valuation','Trade Valuation'])).toLowerCase().includes('yes'))valuations++}return{count,testDrives,valuations}}
function sum(a,f){return a.reduce((x,y)=>x+Number(y[f]||0),0)}function volumeUnlock(u){return[...state.settings.volume_unlocks].sort((a,b)=>a.units-b.units).reduce((v,r)=>u>=r.units?r.unlock:v,0)}
function commissionComponents(m){const gpBase=m.total_gp*(state.settings.commission_rate||.05)*volumeUnlock(m.units);const per_delivery=m.units*100;const volume_bonus=m.units>=18?750:0;const finance_pen_bonus=m.finance_penetration>=.45?500:m.finance_penetration>=.25?250:0;const finance_ipur_bonus=m.finance_ipur>=1800?1000:m.finance_ipur>=500?500:0;const aftercare_bonus=m.aftercare_ppv>=950?1100:m.aftercare_ppv>=500?500:m.aftercare_ppv>=250?250:0;const accessory_bonus=m.accessory_gp_per_unit>=500?250:0;const review_bonus=(m.reviews||0)*25;const nps_bonus=m.nps>=.85?250:0;const dah_bonus=m.dah>=.85?250:0;const kpi_bonus=finance_pen_bonus+finance_ipur_bonus+aftercare_bonus+accessory_bonus+review_bonus+nps_bonus+dah_bonus;return{per_delivery,volume_bonus,gp_base:gpBase,aftercare_bonus,finance_pen_bonus,finance_ipur_bonus,accessory_bonus,review_bonus,nps_bonus,dah_bonus,kpi_bonus}}
function pspScore(m){let score=0;score+=Math.min(25,m.units/18*25);score+=Math.min(15,m.finance_penetration/.45*15);score+=Math.min(15,m.finance_ipur/1800*15);score+=Math.min(15,m.aftercare_ppv/950*15);score+=Math.min(10,m.accessory_gp_per_unit/500*10);score+=Math.min(8,m.leads/20*8);score+=Math.min(6,m.nps/.85*6);score+=Math.min(6,m.dah/.85*6);return Math.round(score)}function pspTier(s){if(s>=90)return'Leading';if(s>=75)return'Performing';if(s>=60)return'Building';return'Stabilise'}
function coach(m){const strengths=[],opportunities=[],focus=[];if(m.units>=18)strengths.push('Volume is at full commission unlock. Keep appointment discipline high so performance does not become reactive.');else focus.push(`Create a daily appointment target to close the gap to 18 deliveries. Current gap: ${Math.max(0,18-m.units)} unit(s).`);if(m.finance_penetration>=.45)strengths.push('Finance penetration is at or above target.');else focus.push('Finance must be introduced earlier as part of the buying pathway, not as a late-stage extra.');if(m.finance_ipur>=1800)strengths.push('Finance IPUR is strong, indicating quality finance conversations.');else opportunities.push('Finance income per retail unit needs stronger structure and manager support.');if(m.aftercare_ppv>=950)strengths.push('Aftercare PPV is supporting deal quality.');else focus.push('Aftercare value needs to be positioned before delivery day so it feels like protection, not pressure.');if(m.accessory_gp_per_unit>=500)strengths.push('Accessory income is adding meaningful value per car.');else opportunities.push('Accessories need a consistent menu conversation attached to every quote and handover.');if(m.leads>0)strengths.push('Lead activity is visible and can be coached from activity to outcome.');else focus.push('Lead activity is not visible yet. We need the activity report feeding this dashboard every month.');if(m.nps>=.85)strengths.push('NPS is strong. Preserve this with proactive delivery communication.');else opportunities.push('NPS needs attention: set clearer expectations before delivery and follow up fast after handover.');if(m.dah>=.85)strengths.push('DAH result is strong.');else opportunities.push('DAH is below ideal level. Tighten handover quality, customer updates and documentation control.');return{summary:`${m.salesperson} is currently ${m.tier} with a PSP score of ${m.score}. The month ahead should focus on disciplined appointments, earlier finance introduction, and stronger per-vehicle value capture.`,strengths,opportunities,focus:focus.slice(0,3)}}
function renderDashboard(){const own=state.profile.role==='salesperson';const rows=own?state.metrics.filter(m=>key(m.salesperson)===key(state.profile.full_name)):state.metrics;const totals={units:sum(rows,'units'),gp:sum(rows,'total_gp'),comm:sum(rows,'commission_payable'),fin:rows.reduce((a,m)=>a+m.finance_count,0),leads:sum(rows,'leads')};$('dashboardTab').innerHTML=`<section class="grid cols4"><div class="metric"><div class="label">Units</div><div class="value">${totals.units}</div></div><div class="metric"><div class="label">Total GP</div><div class="value">${money(totals.gp)}</div></div><div class="metric"><div class="label">Leads</div><div class="value">${totals.leads}</div></div><div class="metric"><div class="label">Total Commission</div><div class="value">${money(totals.comm)}</div></div></section><section class="panel"><div class="section-head"><div><h2>${own?'My Performance':'Team Performance'}</h2><p class="muted">Top section = actual results. Review button expands the paid commission elements and PSP coaching.</p></div>${own?'':`<a class="btn primary" href="mailto:?subject=${encodeURIComponent('Commission summary - '+(state.period?.label||''))}&body=${encodeURIComponent(buildFcMail(rows))}">Mail to F.C</a>`}</div><div class="table-wrap"><table><thead><tr><th>Salesperson</th><th class="right">Units</th><th class="right">Leads</th><th class="right">Sign Ups</th><th class="right">Finance %</th><th class="right">Finance IPUR</th><th class="right">Aftercare PPV</th><th class="right">Accessory GP/U</th><th class="right">NPS</th><th class="right">DAH</th><th class="right">Reviews</th><th class="right">PSP</th><th class="right">Total Comm</th><th></th></tr></thead><tbody>${rows.map((m,i)=>rowHtml(m,i)).join('')||`<tr><td colspan="14" class="muted">No normalized data yet.</td></tr>`}</tbody></table></div><div class="mobile-cards">${rows.map((m,i)=>mobileCard(m,i)).join('')||'<p class="muted">No normalized data yet.</p>'}</div></section>`;$('dashboardTab').querySelectorAll('[data-review]').forEach(b=>b.onclick=()=>openReview(rows[Number(b.dataset.review)]))}
function rowHtml(m,i){return`<tr><td><strong>${esc(m.salesperson)}</strong><div class="small muted">${esc(m.psp_tier)}</div></td><td class="right">${m.units}</td><td class="right">${m.leads}</td><td class="right">${m.signups}</td><td class="right">${pct(m.finance_penetration)}</td><td class="right">${money(m.finance_ipur)}</td><td class="right">${money(m.aftercare_ppv)}</td><td class="right">${money(m.accessory_gp_per_unit)}</td><td class="right">${pct(m.nps)}</td><td class="right">${pct(m.dah)}</td><td class="right">${m.reviews}</td><td class="right"><span class="pill ${m.psp_score>=75?'good':m.psp_score>=60?'warn':'bad'}">${esc(m.psp_tier)} · ${Math.round(m.psp_score)}</span></td><td class="right"><strong>${money(m.commission_payable)}</strong></td><td><button class="btn" data-review="${i}">Review</button></td></tr>`}
function mobileCard(m,i){return`<article class="person-card"><div class="section-head"><div><h3>${esc(m.salesperson)}</h3><p class="muted">${esc(m.psp_tier)} · PSP ${Math.round(m.psp_score)}</p></div><button class="btn" data-review="${i}">Review</button></div><div class="kv"><span>Units</span><strong>${m.units}</strong></div><div class="kv"><span>Leads</span><strong>${m.leads}</strong></div><div class="kv"><span>Finance</span><strong>${pct(m.finance_penetration)} / ${money(m.finance_ipur)}</strong></div><div class="kv"><span>Aftercare PPV</span><strong>${money(m.aftercare_ppv)}</strong></div><div class="kv"><span>Commission</span><strong>${money(m.commission_payable)}</strong></div></article>`}
function buildFcMail(rows){return`Commission summary - ${state.period?.label||''}\n\n`+rows.map(m=>`${m.salesperson}: Units ${m.units}, Leads ${m.leads}, Finance ${pct(m.finance_penetration)}, Aftercare PPV ${money(m.aftercare_ppv)}, PSP ${m.psp_tier} ${Math.round(m.psp_score)}, Total Comm ${money(m.commission_payable)}`).join('\n')}
function openReview(m){const c=commissionComponents(m);$('modalTitle').textContent=m.salesperson;$('modalBody').innerHTML=`<div class="grid cols3" style="margin:16px 0"><div class="metric"><div class="label">Total Commission</div><div class="value">${money(m.commission_payable)}</div></div><div class="metric"><div class="label">PSP</div><div class="value">${Math.round(m.psp_score)}</div></div><div class="metric"><div class="label">Tier</div><div class="value">${esc(m.psp_tier)}</div></div></div><section class="panel" style="box-shadow:none"><h3>Actual results</h3><div class="grid cols3"><div class="coach-card">Units: <strong>${m.units}</strong><br>Leads: <strong>${m.leads}</strong><br>Sign Ups: <strong>${m.signups}</strong></div><div class="coach-card">Finance Pen: <strong>${pct(m.finance_penetration)}</strong><br>Finance IPUR: <strong>${money(m.finance_ipur)}</strong><br>Aftercare PPV: <strong>${money(m.aftercare_ppv)}</strong></div><div class="coach-card">Accessory GP/U: <strong>${money(m.accessory_gp_per_unit)}</strong><br>NPS: <strong>${pct(m.nps)}</strong><br>DAH: <strong>${pct(m.dah)}</strong><br>Reviews: <strong>${m.reviews}</strong></div></div></section><section class="panel" style="box-shadow:none"><h3>Commission elements paid</h3><div class="table-wrap" style="display:block"><table style="min-width:680px"><tbody>${Object.entries(c).filter(([k])=>k!=='kpi_bonus').map(([k,v])=>`<tr><td>${label(k)}</td><td class="right"><strong>${money(v)}</strong></td></tr>`).join('')}<tr><td><strong>Total commission</strong></td><td class="right"><strong>${money(m.commission_payable)}</strong></td></tr></tbody></table></div></section><section class="panel" style="box-shadow:none"><h3>PSP / AI Coaching</h3><p class="muted">${esc(m.coaching_summary||'')}</p><div class="grid cols3"><div class="coach-card"><h3>Strengths</h3>${list(m.strengths)}</div><div class="coach-card"><h3>Opportunities</h3>${list(m.opportunities)}</div><div class="coach-card"><h3>Top 3 focus areas</h3>${list(m.focus_areas)}</div></div></section><p><a class="btn primary" href="mailto:${esc(m.role_email||'')}?subject=${encodeURIComponent('PSP performance review - '+m.salesperson)}&body=${encodeURIComponent((m.coaching_summary||'')+'\n\nTop focus areas:\n'+arr(m.focus_areas).join('\n'))}">Mail PSP review</a></p>`;$('modal').classList.remove('hidden')}
function label(k){return k.replaceAll('_',' ').replace(/\b\w/g,m=>m.toUpperCase()).replace('G P','GP').replace('Nps','NPS').replace('Dah','DAH')}
function arr(v){if(Array.isArray(v))return v;try{return JSON.parse(v||'[]')}catch{return[]}}function list(v){const a=arr(v);return`<ul>${a.map(x=>`<li>${esc(x)}</li>`).join('')||'<li class="muted">No items yet.</li>'}</ul>`}
function renderCoaching(){const own=state.profile.role==='salesperson';const rows=own?state.metrics.filter(m=>key(m.salesperson)===key(state.profile.full_name)):state.metrics;$('coachingTab').innerHTML=`<section class="panel"><h2>${own?'My AI Coaching':'AI Coaching Review'}</h2><p class="muted">Use this as the monthly coaching map: what is working, what is leaking, and the top three behaviours to coach next.</p><div class="coach">${rows.map(m=>`<article class="coach-card"><div class="section-head"><div><h3>${esc(m.salesperson)}</h3><p class="muted">${esc(m.coaching_summary||'')}</p></div><span class="pill ${m.psp_score>=75?'good':m.psp_score>=60?'warn':'bad'}">${esc(m.psp_tier)} · ${Math.round(m.psp_score)}</span></div><div class="grid cols3"><div><strong>Strengths</strong>${list(m.strengths)}</div><div><strong>Opportunities</strong>${list(m.opportunities)}</div><div><strong>Top 3 focus</strong>${list(m.focus_areas)}</div></div></article>`).join('')||'<p class="muted">No coaching available until normalization is run.</p>'}</div></section>`}
function renderSettings(){if(state.profile.role!=='admin'){$('settingsTab').innerHTML='';return}$('settingsTab').innerHTML=`<section class="panel"><div class="section-head"><div><h2>Commission settings</h2><p class="muted">Admin only. Managers cannot edit this section.</p></div><button id="saveSettings" class="btn primary">Save settings</button></div><div class="settings-box"><label class="field"><span>Base GP commission rate</span><input id="setRate" class="input" type="number" step="0.01" value="${state.settings.commission_rate||.05}"></label><label class="field"><span>Finance penetration target</span><input id="setFinance" class="input" type="number" step="0.01" value="${state.settings.kpi_targets.finance_penetration||.45}"></label><label class="field"><span>Finance IPUR target</span><input id="setIpur" class="input" type="number" value="${state.settings.kpi_targets.finance_ipur||1800}"></label><label class="field"><span>Aftercare PPV target</span><input id="setAftercare" class="input" type="number" value="${state.settings.kpi_targets.aftercare_ppv||950}"></label></div><p class="formula">Volume unlock remains: 12 units = 25%, 15 units = 75%, 18 units = 100%.</p></section>`;$('saveSettings').onclick=saveSettings}
async function saveSettings(){state.settings.commission_rate=Number($('setRate').value);state.settings.kpi_targets.finance_penetration=Number($('setFinance').value);state.settings.kpi_targets.finance_ipur=Number($('setIpur').value);state.settings.kpi_targets.aftercare_ppv=Number($('setAftercare').value);const {data}=await sb.from('commission_settings').select('id').eq('active',true).limit(1).single();const {error}=await sb.from('commission_settings').update({settings:state.settings}).eq('id',data.id);toast(error?error.message:'Settings saved. Re-run normalization to apply changes.')}
boot().catch(err=>{console.error(err);toast(err.message||'Something went wrong.')});
</script>
