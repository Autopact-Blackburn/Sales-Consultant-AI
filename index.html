    :root{

x;border-radius:16px;background:#0b1220;border:1px solid var(--line);box-shadow:var(--shadow);z-index:50}.modal{position:fixed;inset:0;background:rgba(2,6,23,.72);display:grid;place-items:center;padding:18px;z-index:40}.modal-box{width:min(860px,100%);max-height:88vh;overflow:auto;background:#101827;border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow)}.modal-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.x{font-size:24px;line-height:1}.formula{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#cbd5e1;white-space:pre-wrap}.lock{opacity:.55;pointer-events:none}.home-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}

<body>
  <div id="loginView" class="narrow">
    <section class="login-card panel">
      <p class="eyebrow">Secure Access</p><h1 style="margin:0 0 8px">Dealership Performance</h1><p class="muted">One clean operating room for commissions, PSP and coaching.</p>

<script type="module">
const SUPABASE_URL = 'https://snzjsuwqetomdkvphvzs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuempzdXdxZXRvbWRrdnBodnpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDQ5MTksImV4cCI6MjA5MzUyMDkxOX0.mkJ1_nxP0emPvhSqgUz7Q4zKm63LtG0J7xiYhwT78QQ';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const REQUIRED_TYPES = ['deal_log','finance','aftercare','accessories','signups','leads'];
const TYPE_LABEL = {deal_log:'Deal Log',finance:'Finance',aftercare:'Aftercare',accessories:'Accessories',signups:'Sign Ups',leads:'Leads / Activity'};
let state = { user:null, profile:null, periods:[], period:null, files:{}, parsed:{}, metrics:[], deals:[], settings:null, active:'dashboard' };

const $ = id => document.getElementById(id);
const money = n => new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',maximumFractionDigits:0}).format(Number(n||0));
const pct = n => `${Math.round(Number(n||0)*100)}%`;
const key = s => String(s||'').trim().toLowerCase();
function toast(msg){ $('toast').textContent=msg; $('toast').classList.remove('hidden'); setTimeout(()=>$('toast').classList.add('hidden'),4200); }
function num(v){ if(v==null) return 0; const s=String(v).replace(/[$,()%]/g,'').trim(); const n=Number(s); return Number.isFinite(n)?n:0; }
function first(row,names){ const keys=Object.keys(row); for(const n of names){ const hit=keys.find(k=>key(k)===key(n)); if(hit) return row[hit]; } return ''; }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function boot(){
  $('loginForm').addEventListener('submit', login); $('logoutBtn').addEventListener('click', logout); $('periodSelect').addEventListener('change',()=>{ state.period=state.periods.find(p=>p.id===$('periodSelect').value); refreshData(); }); $('modalClose').onclick=()=> $('modal').classList.add('hidden');
  const {data:{session}} = await sb.auth.getSession(); if(!session){ showLogin(); return; } state.user=session.user; await loadProfile(); await loadPeriods(); await loadSettings(); route(); await refreshData();
}
function showLogin(){ $('loginView').classList.remove('hidden'); $('appView').classList.add('hidden'); }
async function login(e){ e.preventDefault(); $('loginMsg').textContent='Checking access...'; const {data,error}=await sb.auth.signInWithPassword({email:$('loginEmail').value.trim(),password:$('loginPassword').value}); if(error){$('loginMsg').textContent=error.message;return;} state.user=data.user; await loadProfile(); await loadPeriods(); await loadSettings(); route(); await refreshData(); }
async function logout(){ await sb.auth.signOut(); location.reload(); }
async function loadProfile(){ const {data,error}=await sb.from('app_profiles').select('*').eq('auth_user_id',state.user.id).eq('active',true).single(); if(error||!data){ toast('No active app profile found for this login. Add this user to app_profiles.'); await sb.auth.signOut(); showLogin(); throw error; } state.profile=data; }
async function loadPeriods(){ const {data,error}=await sb.from('commission_periods').select('*').order('month_start',{ascending:false}); if(error) throw error; state.periods=data||[]; state.period=state.periods[0]; $('periodSelect').innerHTML=state.periods.map(p=>`<option value="${p.id}">${esc(p.label)}</option>`).join(''); if(state.period) $('periodSelect').value=state.period.id; }
async function loadSettings(){ const {data}=await sb.from('commission_settings').select('*').eq('active',true).limit(1).maybeSingle(); state.settings=data?.settings || defaultSettings(); }
function defaultSettings(){ return {volume_unlocks:[{units:12,unlock:.25},{units:15,unlock:.75},{units:18,unlock:1}],commission_rate:.10,kpi_targets:{finance_penetration:.45,finance_ipur:1800,aftercare_ppv:950,accessory_gp:500,reviews:5,nps:85,dah:85},kpi_bonus:{finance_penetration:250,finance_ipur:250,aftercare_ppv:250,accessory_gp:150,reviews:150,nps:150,dah:150},psp:{bronze:{min_score:0,label:'Stabilise'},silver:{min_score:60,label:'Building'},gold:{min_score:75,label:'Performing'},platinum:{min_score:90,label:'Leading'}}}; }
function route(){ $('loginView').classList.add('hidden'); $('appView').classList.remove('hidden'); const r=state.profile.role; $('roleLabel').textContent = r==='admin'?'Admin access':r==='manager'?'Manager access':'Salesperson view'; $('welcomeLine').textContent=`Welcome, ${state.profile.full_name}`; const tabs = r==='admin' ? [['import','Imports'],['dashboard','Dashboard'],['coaching','AI Coaching'],['settings','Settings']] : r==='manager' ? [['import','Imports'],['dashboard','Dashboard'],['coaching','AI Coaching']] : [['dashboard','My Performance'],['coaching','My Coaching']]; state.active = r==='salesperson'?'dashboard':'import'; renderTabs(tabs); }
function renderTabs(tabs){ $('tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab ${id===state.active?'active':''}" data-tab="${id}">${label}</button>`).join(''); $('tabs').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.active=b.dataset.tab; showTab(); renderTabs(tabs);}); showTab(); }
function showTab(){ ['import','dashboard','coaching','settings'].forEach(t=>$(t+'Tab').classList.toggle('hidden',state.active!==t)); $('pageTitle').textContent = state.active==='import'?'Commission Data Imports':state.active==='settings'?'Settings':state.active==='coaching'?'AI Coaching':'Team commissions'; }
async function refreshData(){ if(!state.period) return; await loadDashboardData(); renderAll(); }
async function loadDashboardData(){ const role=state.profile.role; let q=sb.from('salesperson_monthly_metrics').select('*').eq('period_id',state.period.id).order('units',{ascending:false}); const {data:metrics}=await q; state.metrics=metrics||[]; const {data:deals}=await sb.from('master_deals').select('*').eq('period_id',state.period.id).order('salesperson'); state.deals=deals||[]; }
function renderAll(){ renderImport(); renderDashboard(); renderCoaching(); renderSettings(); showTab(); }

function renderImport(){ if(state.profile.role==='salesperson') return; const done=Object.keys(state.parsed).length; $('importTab').innerHTML=`
  <section class="grid cols4"><div class="metric"><div class="label">Files detected</div><div class="value">${done} / 6</div></div><div class="metric"><div class="label">Period</div><div class="value">${esc(state.period?.label||'')}</div></div><div class="metric"><div class="label">Rows staged</div><div class="value">${Object.values(state.parsed).reduce((a,b)=>a+b.rows.length,0)}</div></div><div class="metric"><div class="label">Status</div><div class="value">Draft</div></div></section>
  <section class="panel"><div class="section-head"><div><h2>Upload monthly CSV exports</h2><p class="muted">Drop the six files here. The Deal Log anchors the month. Other files attach by deal number and salesperson.</p></div><button class="btn primary" id="normalizeBtn">Run normalization</button></div><div id="dropzone" class="dropzone"><input id="fileInput" type="file" accept=".csv,.txt" multiple hidden><div class="eyebrow">CSV Import</div><div class="big">Drop files here or click to browse</div><p class="muted">Deal Log, Finance, Aftercare, Accessories, Sign Ups and Leads / Activity.</p></div><div id="fileList" class="file-list"></div></section>`;
  const dz=$('dropzone'), fi=$('fileInput'); dz.onclick=()=>fi.click(); dz.ondragover=e=>{e.preventDefault(); dz.classList.add('drag')}; dz.ondragleave=()=>dz.classList.remove('drag'); dz.ondrop=e=>{e.preventDefault(); dz.classList.remove('drag'); handleFiles(e.dataTransfer.files)}; fi.onchange=e=>handleFiles(e.target.files); $('normalizeBtn').onclick=normalizeAndSave; renderFileList(); }
function renderFileList(){ const box=$('fileList'); if(!box) return; box.innerHTML=REQUIRED_TYPES.map(t=>{ const p=state.parsed[t]; const detail=p?`${esc(p.name)} · ${Math.round(p.confidence||0)}% confidence${p.reason?' · '+esc(p.reason):''}`:'Waiting for file'; return `<div class="file-row"><div><strong>${TYPE_LABEL[t]}</strong><div class="small muted">${detail}</div></div><span class="pill ${p?'good':'warn'}">${p?p.rows.length+' rows':'Missing'}</span></div>`; }).join(''); }
async function handleFiles(fileList){ for(const file of Array.from(fileList)){ const text=await file.text(); const rows=parseCSV(text); const detected=detectType(file.name, rows); if(!detected.type){ toast(`Could not confidently detect ${file.name}. Rename it with Deal Log, Finance, Aftercare, Accessories/ACC, Sign Ups, or Leads.`); continue; } state.parsed[detected.type]={name:file.name,rows,confidence:detected.confidence,reason:detected.reason,scores:detected.scores}; toast(`${file.name} detected as ${TYPE_LABEL[detected.type]} (${Math.round(detected.confidence)}%).`); } renderFileList(); }
function parseCSV(text){ const rows=[]; let cur='',row=[],q=false; for(let i=0;i<text.length;i++){ const c=text[i],n=text[i+1]; if(c==='"'&&q&&n==='"'){cur+='"';i++;continue} if(c==='"'){q=!q;continue} if(c===','&&!q){row.push(cur);cur='';continue} if((c==='\n'||c==='\r')&&!q){ if(c==='\r'&&n==='\n') i++; row.push(cur); if(row.some(x=>String(x).trim())) rows.push(row); row=[]; cur=''; continue} cur+=c; } row.push(cur); if(row.some(x=>String(x).trim())) rows.push(row); if(!rows.length) return []; const headers=rows.shift().map(h=>h.trim()); return rows.map(r=>Object.fromEntries(headers.map((h,i)=>[h,(r[i]??'').trim()]))); }
function detectType(name,rows){
  const filename=key(name).replace(/[_\-]+/g,' ');
  const sampleRows=Array.isArray(rows)?rows.slice(0,12):[];
  const headers=[...new Set(sampleRows.flatMap(r=>Object.keys(r||{}).map(h=>key(h))))];
  const headerText=headers.join(' | ');
  const valuesText=sampleRows.map(r=>Object.values(r||{}).slice(0,18).join(' ')).join(' ').toLowerCase();
  const scores={deal_log:0,finance:0,aftercare:0,accessories:0,signups:0,leads:0};
  const reasons={deal_log:[],finance:[],aftercare:[],accessories:[],signups:[],leads:[]};
  const add=(type,points,reason)=>{scores[type]+=points; reasons[type].push(reason);};
  const hasAny=(terms)=>terms.some(t=>headerText.includes(key(t))||filename.includes(key(t)));
  const hasHeader=(terms)=>terms.some(t=>headers.includes(key(t))||headerText.includes(key(t)));

  // Filename fingerprints are deliberate because DealerCell/BI exports often reuse similar money columns.
  if(/\bdeal\s*log\b/.test(filename)||filename==='deal log csv') add('deal_log',120,'filename says Deal Log');
  if(/\b(acc|accessory|accessories)\b/.test(filename)) add('accessories',95,'filename says ACC / Accessories');
  if(/\bfinance\b|\bf[& ]?i\b|group finance/.test(filename)) add('finance',95,'filename says Finance');
  if(/\baftercare\b|\baftermarket\b|\bpvr\b/.test(filename)) add('aftercare',95,'filename says Aftercare');
  if(/\bsign\s*ups?\b|\bsignups?\b/.test(filename)) add('signups',95,'filename says Sign Ups');
  if(/\bleads?\b|activity report|dealer cell|dealercell/.test(filename)) add('leads',95,'filename says Leads / Activity');

  // Deal Log is the anchor file: it needs deal/customer/salesperson plus vehicle or gross structure.
  if(hasHeader(['deal no','deal number','deal #'])) add('deal_log',18,'has deal number');
  if(hasHeader(['salesperson','sales person','consultant','sold by'])) add('deal_log',18,'has salesperson');
  if(hasHeader(['customer','customer name','client'])) add('deal_log',12,'has customer');
  if(hasHeader(['processed gross','vehicle gross','gross profit','am - gross','am gross'])) add('deal_log',38,'has gross structure');
  if(hasHeader(['vehicle description','vehicle','model','make','variant','stock no'])) add('deal_log',18,'has vehicle fields');
  if(hasHeader(['sale price','selling price','payment method','status'])) add('deal_log',10,'has sale/status fields');

  // Accessories: require accessory-specific commercial fields. Do NOT let generic deal/sale columns beat Deal Log.
  if(hasHeader(['accessory','accessories','accessory description','item description'])) add('accessories',45,'has accessory description');
  if(hasHeader(['sale amount','sell amount','retail amount'])) add('accessories',24,'has accessory sale amount');
  if(hasHeader(['cost amount','cost','buy amount'])) add('accessories',24,'has accessory cost amount');
  if(hasHeader(['accessory gp','accessories gp','gp','gross profit'])) add('accessories',16,'has accessory GP');

  // Finance: total income alone is not enough, but finance-specific headers/filename make it safe.
  if(hasHeader(['dealer finance','finance type','finance company','lender','contract no','total income','finance income','ipur'])) add('finance',40,'has finance fields');
  if(hasHeader(['amount financed','finance amount','brokerage','commission'])) add('finance',18,'has finance money fields');

  // Aftercare / aftermarket PVR.
  if(hasHeader(['total aftermarket','aftermarket','aftercare','am pvr','pvr','paint protection','tint','warranty'])) add('aftercare',44,'has aftercare fields');
  if(hasHeader(['aftermarket consultant','aftermarket income','aftercare income'])) add('aftercare',24,'has aftermarket income fields');

  // Sign Ups.
  if(hasHeader(['sign up','signup','signed up','appointment date','appointment type'])) add('signups',42,'has sign-up/appointment fields');
  if(valuesText.includes('sign up')||valuesText.includes('signed up')) add('signups',16,'row text mentions sign-up');

  // Leads / activity.
  if(hasHeader(['lead','enquiry','enquiry date','source','activity','test drive','valuation','appointment','created date'])) add('leads',46,'has lead/activity fields');
  if(hasHeader(['phone call','sms','email sent','web lead','dealer cell','dealercell'])) add('leads',18,'has DealerCell activity fields');

  // Guardrails for known overlaps.
  if(scores.deal_log>=70 && filename.includes('deal log')) scores.accessories=Math.max(0,scores.accessories-55);
  if(scores.accessories>=80 && /\b(acc|accessory|accessories)\b/.test(filename)) scores.deal_log=Math.max(0,scores.deal_log-25);
  if(scores.aftercare>=80 && /aftercare|aftermarket|pvr/.test(filename)) scores.finance=Math.max(0,scores.finance-20);

  const ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const [type,score]=ranked[0];
  const second=ranked[1]?.[1]||0;
  if(score<45 || (score-second<12 && score<100)) return {type:null,confidence:0,reason:'low confidence',scores};
  return {type,confidence:Math.min(99,Math.max(55,score)),reason:(reasons[type]||[]).slice(0,2).join(', '),scores};
}
async function normalizeAndSave(){ if(!state.parsed.deal_log){ toast('Deal Log is required before normalization.'); return; } toast('Normalizing period...'); const periodId=state.period.id; for(const [type,p] of Object.entries(state.parsed)){ const {data:batch,error:bErr}=await sb.from('raw_import_batches').insert({period_id:periodId,import_type:type,file_name:p.name,row_count:p.rows.length,uploaded_by:state.user.id}).select().single(); if(bErr){toast(bErr.message);return;} const rows=p.rows.map((r,i)=>({period_id:periodId,batch_id:batch.id,import_type:type,row_number:i+1,deal_no:String(first(r,['Deal No','Deal Number','Deal #','Stock No'])),salesperson:String(first(r,['Salesperson','Sales Person','Consultant','Sold By'])),customer_name:String(first(r,['Customer','Customer Name','Client'])),raw:r})); for(let i=0;i<rows.length;i+=500){ const {error}=await sb.from('raw_import_rows').insert(rows.slice(i,i+500)); if(error){toast(error.message);return;} } }
  const deals=buildMasterDeals(); await sb.from('master_deals').delete().eq('period_id',periodId); for(let i=0;i<deals.length;i+=500){ const {error}=await sb.from('master_deals').insert(deals.slice(i,i+500)); if(error){toast(error.message);return;} }
  const metrics=buildMetrics(deals); await sb.from('salesperson_monthly_metrics').delete().eq('period_id',periodId); const {data:staff}=await sb.from('staff').select('*').eq('active',true); const staffMap=Object.fromEntries((staff||[]).map(s=>[key(s.full_name),s])); const payload=metrics.map(m=>({...m,period_id:periodId,staff_id:staffMap[key(m.salesperson)]?.id||null,role_email:staffMap[key(m.salesperson)]?.email||null})); const {error:mErr}=await sb.from('salesperson_monthly_metrics').insert(payload); if(mErr){toast(mErr.message);return;} toast('Normalization complete. Dashboard updated.'); await refreshData(); state.active='dashboard'; showTab(); }
function buildMasterDeals(){ const dealRows=state.parsed.deal_log.rows; const byDeal={}; for(const r of dealRows){ const d=String(first(r,['Deal No','Deal Number','Deal #','Stock No'])).trim(); if(!d) continue; byDeal[d]={period_id:state.period.id,deal_no:d,customer_name:first(r,['Customer','Customer Name','Client']),salesperson:first(r,['Salesperson','Sales Person','Consultant','Sold By']),dealership:first(r,['Dealership','Dealer']),department:first(r,['Department']),brand:first(r,['Brand','Make']),vehicle_make:first(r,['Make','Vehicle Make']),vehicle_model:first(r,['Model','Vehicle Model']),vehicle_variant:first(r,['Variant']),vehicle_description:first(r,['Vehicle','Description','Vehicle Description']),sale_price:num(first(r,['Sale Price','Selling Price','Price'])),processed_gross:num(first(r,['Processed Gross','Gross'])),am_gross:num(first(r,['AM - Gross','AM Gross','Aftermarket Gross'])),vehicle_gp:0,finance_income:0,finance_deal:false,aftercare_income:0,accessory_gp:0,signup_count:0,lead_count:0,test_drive_count:0,valuation_count:0,payment_method:first(r,['Payment Method']),status:first(r,['Status'])||'New',source:{deal_log:r}}; byDeal[d].vehicle_gp=byDeal[d].processed_gross-byDeal[d].am_gross; }
  attach('finance',(r,d)=>{d.finance_income+=num(first(r,['Total Income','Income','Finance Income'])); d.finance_deal=(String(first(r,['Dealer Finance','Finance','Financed'])).toLowerCase().includes('yes')||d.finance_income>0);});
  attach('aftercare',(r,d)=>{d.aftercare_income+=num(first(r,['Total Aftermarket','Aftermarket','Aftercare Income','AM Gross']));});
  attach('accessories',(r,d)=>{const gp=num(first(r,['GP','Gross Profit'])) || (num(first(r,['Sale Amount','Sale']))-num(first(r,['Cost Amount','Cost']))); d.accessory_gp+=gp;});
  attach('signups',(r,d)=>{d.signup_count+=1;}); attach('leads',(r,d)=>{d.lead_count+=1; if(String(first(r,['Test Drive','Test Drives'])).toLowerCase().includes('yes')) d.test_drive_count+=1; if(String(first(r,['Valuation','Trade Valuation'])).toLowerCase().includes('yes')) d.valuation_count+=1;});
  return Object.values(byDeal);
  function attach(type,fn){ for(const r of state.parsed[type]?.rows||[]){ const dno=String(first(r,['Deal No','Deal Number','Deal #','Stock No'])).trim(); if(dno&&byDeal[dno]){ fn(r,byDeal[dno]); byDeal[dno].source[type]=r; } } }
}
function buildMetrics(deals){ const groups={}; for(const d of deals){ const sp=d.salesperson||'Unassigned'; groups[sp] ||= []; groups[sp].push(d); } return Object.entries(groups).map(([salesperson,ds])=>calcMetric(salesperson,ds)); }
function calcMetric(salesperson,ds){ const units=ds.length,total_gp=sum(ds,'vehicle_gp'), finance_count=ds.filter(d=>d.finance_deal).length, finance_income=sum(ds,'finance_income'), aftercare_income=sum(ds,'aftercare_income'), accessory_gp=sum(ds,'accessory_gp'), signups=sum(ds,'signup_count'), leads=sum(ds,'lead_count'), test_drives=sum(ds,'test_drive_count'), valuations=sum(ds,'valuation_count'); const finance_penetration=units?finance_count/units:0, finance_ipur=finance_count?finance_income/finance_count:0, aftercare_ppv=units?aftercare_income/units:0, accessory_gp_per_unit=units?accessory_gp/units:0; const unlock=volumeUnlock(units); const kpi=kpiBonus({finance_penetration,finance_ipur,aftercare_ppv,accessory_gp:accessory_gp_per_unit,reviews:0,nps:0,dah:0}); const commission_payable=(total_gp*(state.settings.commission_rate||.10)*unlock)+kpi.bonus; const score=pspScore({units,finance_penetration,finance_ipur,aftercare_ppv,accessory_gp_per_unit,signups,leads}); const tier=pspTier(score); const coaching=coach({salesperson,units,finance_penetration,finance_ipur,aftercare_ppv,accessory_gp_per_unit,score,tier}); return {salesperson,units,total_gp,finance_count,finance_income,finance_penetration,finance_ipur,aftercare_income,aftercare_ppv,accessory_gp,accessory_gp_per_unit,signups,leads,test_drives,valuations,reviews:0,nps:0,dah:0,volume_unlock:unlock,psp_score:score,psp_tier:tier,kpi_bonus:kpi.bonus,commission_payable,coaching_summary:coaching.summary,strengths:coaching.strengths,opportunities:coaching.opportunities,focus_areas:coaching.focus}; }
function sum(a,f){return a.reduce((x,y)=>x+Number(y[f]||0),0)} function volumeUnlock(u){ return [...state.settings.volume_unlocks].sort((a,b)=>a.units-b.units).reduce((v,r)=>u>=r.units?r.unlock:v,0); }
function kpiBonus(m){ const t=state.settings.kpi_targets,b=state.settings.kpi_bonus; let bonus=0; for(const k of Object.keys(t)){ if(Number(m[k]||0)>=Number(t[k])) bonus+=Number(b[k]||0); } return {bonus}; }
function pspScore(m){ let score=0; score+=Math.min(35,m.units/18*35); score+=Math.min(20,m.finance_penetration/.45*20); score+=Math.min(15,m.finance_ipur/1800*15); score+=Math.min(15,m.aftercare_ppv/950*15); score+=Math.min(10,m.accessory_gp_per_unit/500*10); score+=Math.min(5,m.leads/20*5); return Math.round(score); }
function pspTier(score){ if(score>=90) return 'Leading'; if(score>=75) return 'Performing'; if(score>=60) return 'Building'; return 'Stabilise'; }
function coach(m){ const strengths=[],opportunities=[],focus=[]; if(m.units>=18) strengths.push('Strong volume month with full unlock achieved.'); else focus.push(`Close ${Math.max(0,12-m.units)} more unit(s) to reach the first volume unlock.`); if(m.finance_penetration>=.45) strengths.push('Finance penetration is at or above target.'); else opportunities.push('Finance introduction consistency needs tightening.'); if(m.aftercare_ppv>=950) strengths.push('Aftercare PPV is supporting total deal quality.'); else opportunities.push('Aftercare value needs stronger early positioning.'); if(m.accessory_gp_per_unit>=500) strengths.push('Accessory GP is contributing well.'); else focus.push('Build an accessory conversation into every handover and quote review.'); return {summary:`${m.salesperson} is currently ${m.tier} with a PSP score of ${m.score}. The next best move is disciplined appointment control, clean finance introduction and better per-vehicle value capture.`,strengths,opportunities,focus}; }

function renderDashboard(){ const own=state.profile.role==='salesperson'; const rows=own?state.metrics.filter(m=>key(m.salesperson)===key(state.profile.full_name)):state.metrics; const totals={units:sum(rows,'units'),gp:sum(rows,'total_gp'),comm:sum(rows,'commission_payable'),fin:rows.reduce((a,m)=>a+m.finance_count,0)}; $('dashboardTab').innerHTML=`<section class="grid cols4"><div class="metric"><div class="label">Units</div><div class="value">${totals.units}</div></div><div class="metric"><div class="label">Total GP</div><div class="value">${money(totals.gp)}</div></div><div class="metric"><div class="label">Finance deals</div><div class="value">${totals.fin}</div></div><div class="metric"><div class="label">Commission</div><div class="value">${money(totals.comm)}</div></div></section><section class="panel"><div class="section-head"><div><h2>${own?'My Performance':'Team Performance'}</h2><p class="muted">Commission and PSP calculated from normalized monthly imports.</p></div></div><div class="table-wrap"><table><thead><tr><th>Salesperson</th><th class="right">Units</th><th class="right">Unlock</th><th class="right">Finance %</th><th class="right">IPUR</th><th class="right">Aftercare PPV</th><th class="right">Accessory GP/U</th><th class="right">PSP</th><th class="right">Commission</th><th></th></tr></thead><tbody>${rows.map((m,i)=>`<tr><td><strong>${esc(m.salesperson)}</strong><div class="small muted">${esc(m.psp_tier)}</div></td><td class="right">${m.units}</td><td class="right">${pct(m.volume_unlock)}</td><td class="right">${pct(m.finance_penetration)}</td><td class="right">${money(m.finance_ipur)}</td><td class="right">${money(m.aftercare_ppv)}</td><td class="right">${money(m.accessory_gp_per_unit)}</td><td class="right">${Math.round(m.psp_score)}</td><td class="right"><strong>${money(m.commission_payable)}</strong></td><td><button class="btn" data-review="${i}">Review</button></td></tr>`).join('')||`<tr><td colspan="10" class="muted">No normalized data yet.</td></tr>`}</tbody></table></div></section>`; $('dashboardTab').querySelectorAll('[data-review]').forEach(b=>b.onclick=()=>openReview(rows[Number(b.dataset.review)])); }
function openReview(m){ $('modalTitle').textContent=m.salesperson; $('modalBody').innerHTML=`<div class="grid cols3" style="margin:16px 0"><div class="metric"><div class="label">Commission</div><div class="value">${money(m.commission_payable)}</div></div><div class="metric"><div class="label">PSP</div><div class="value">${Math.round(m.psp_score)}</div></div><div class="metric"><div class="label">Tier</div><div class="value">${esc(m.psp_tier)}</div></div></div><p class="muted">${esc(m.coaching_summary||'')}</p><div class="grid cols3"><div class="coach-card"><h3>Strengths</h3>${list(m.strengths)}</div><div class="coach-card"><h3>Opportunities</h3>${list(m.opportunities)}</div><div class="coach-card"><h3>Focus</h3>${list(m.focus_areas)}</div></div><p><a class="btn primary" href="mailto:${esc(m.role_email||'')}?subject=${encodeURIComponent('Performance review - '+m.salesperson)}&body=${encodeURIComponent(m.coaching_summary||'')}">Mail review</a></p>`; $('modal').classList.remove('hidden'); }
function list(v){ const a=Array.isArray(v)?v:JSON.parse(v||'[]'); return `<ul>${a.map(x=>`<li>${esc(x)}</li>`).join('')||'<li class="muted">No items yet.</li>'}</ul>`; }
function renderCoaching(){ const own=state.profile.role==='salesperson'; const rows=own?state.metrics.filter(m=>key(m.salesperson)===key(state.profile.full_name)):state.metrics; $('coachingTab').innerHTML=`<section class="panel"><h2>${own?'My AI Coaching':'AI Coaching Review'}</h2><div class="coach">${rows.map(m=>`<article class="coach-card"><div class="section-head"><div><h3>${esc(m.salesperson)}</h3><p class="muted">${esc(m.coaching_summary||'')}</p></div><span class="pill good">${esc(m.psp_tier)} · ${Math.round(m.psp_score)}</span></div><strong>Top focus areas</strong>${list(m.focus_areas)}</article>`).join('')||'<p class="muted">No coaching available until normalization is run.</p>'}</div></section>`; }
function renderSettings(){ if(state.profile.role!=='admin'){ $('settingsTab').innerHTML=''; return; } $('settingsTab').innerHTML=`<section class="panel"><div class="section-head"><div><h2>Commission settings</h2><p class="muted">Admin only. Managers cannot edit this section.</p></div><button id="saveSettings" class="btn primary">Save settings</button></div><div class="settings-box"><label class="field"><span>Commission rate</span><input id="setRate" class="input" type="number" step="0.01" value="${state.settings.commission_rate||.10}"></label><label class="field"><span>Finance penetration target</span><input id="setFinance" class="input" type="number" step="0.01" value="${state.settings.kpi_targets.finance_penetration||.45}"></label><label class="field"><span>Finance IPUR target</span><input id="setIpur" class="input" type="number" value="${state.settings.kpi_targets.finance_ipur||1800}"></label><label class="field"><span>Aftercare PPV target</span><input id="setAftercare" class="input" type="number" value="${state.settings.kpi_targets.aftercare_ppv||950}"></label></div><p class="formula">Volume unlock remains: 12 units = 25%, 15 units = 75%, 18 units = 100%.</p></section>`; $('saveSettings').onclick=saveSettings; }
async function saveSettings(){ state.settings.commission_rate=Number($('setRate').value); state.settings.kpi_targets.finance_penetration=Number($('setFinance').value); state.settings.kpi_targets.finance_ipur=Number($('setIpur').value); state.settings.kpi_targets.aftercare_ppv=Number($('setAftercare').value); const {data}=await sb.from('commission_settings').select('id').eq('active',true).limit(1).single(); const {error}=await sb.from('commission_settings').update({settings:state.settings}).eq('id',data.id); toast(error?error.message:'Settings saved. Re-run normalization to apply changes.'); }
boot().catch(err=>{console.error(err); toast(err.message||'Something went wrong.');});
</script>
